name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: npm exec -- pnpm install --frozen-lockfile

      - name: Build core package
        run: npm exec -- pnpm --filter @agent-skills/core build

      - name: Build react package
        run: npm exec -- pnpm --filter @agent-skills/react build

      - name: TypeScript check
        run: npm exec -- pnpm -r exec tsc --noEmit || true

      - name: Run tests
        run: npm exec -- pnpm test

      - name: Build demo page
        run: npm exec -- pnpm tsx scripts/generate-demo-data.ts
