name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @agent-skills/core build

      - name: Build react package
        run: pnpm --filter @agent-skills/react build

      - name: TypeScript check
        run: pnpm -r exec tsc --noEmit || true

      - name: Run tests
        run: pnpm test

      - name: Build demo page
        run: pnpm tsx scripts/generate-demo-data.ts
