<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Skills Dashboard — 可视化预览</title>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #111827;
    }
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 { font-size: 18px; }
    .stats {
      font-size: 13px;
      color: #6b7280;
    }
    #graph {
      width: 100%;
      height: calc(100vh - 80px);
    }
    .legend {
      position: absolute;
      top: 90px;
      right: 20px;
      background: white;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .tooltip {
      position: absolute;
      background: white;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 300px;
      z-index: 100;
    }
    .tooltip h3 { font-size: 14px; margin-bottom: 4px; }
    .tooltip p { font-size: 12px; color: #6b7280; }
    .tooltip .phase { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-top: 6px; }
    .phase-define { background: #e0e7ff; color: #4338ca; }
    .phase-plan { background: #ede9fe; color: #7c3aed; }
    .phase-build { background: #d1fae5; color: #047857; }
    .phase-verify { background: #fef3c7; color: #b45309; }
    .phase-review { background: #fee2e2; color: #b91c1c; }
    .phase-ship { background: #dbeafe; color: #1d4ed8; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Agent Skills Dashboard</h1>
    <div class="stats" id="stats">加载中...</div>
  </header>
  
  <svg id="graph"></svg>
  
  <div class="legend" id="legend"></div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    // 阶段颜色映射
    const PHASE_COLORS = {
      define: '#6366f1',
      plan: '#8b5cf6',
      build: '#10b981',
      verify: '#f59e0b',
      review: '#ef4444',
      ship: '#3b82f6'
    };
    
    const PHASE_LABELS = {
      define: 'Define — 定义',
      plan: 'Plan — 计划',
      build: 'Build — 构建',
      verify: 'Verify — 验证',
      review: 'Review — 评审',
      ship: 'Ship — 上线'
    };

    // 从本地文件加载技能数据（这里硬编码示例数据，实际使用时请替换为 API 调用）
    const SKILLS_DATA = __INLINE_DATA__;

    const width = window.innerWidth;
    const height = window.innerHeight - 80;

    const svg = d3.select('#graph')
      .attr('width', width)
      .attr('height', height);

    // 图例
    const legend = d3.select('#legend');
    Object.entries(PHASE_LABELS).forEach(([phase, label]) => {
      legend.append('div')
        .attr('class', 'legend-item')
        .html(`<div class="legend-dot" style="background:${PHASE_COLORS[phase]}"></div><span>${label}</span>`);
    });

    document.getElementById('stats').textContent = `共 ${SKILLS_DATA.nodes.length} 个技能 · ${SKILLS_DATA.edges.length} 条关系`;

    // 创建力导向图
    const simulation = d3.forceSimulation(SKILLS_DATA.nodes)
      .force('link', d3.forceLink(SKILLS_DATA.edges).id(d => d.id).distance(150))
      .force('charge', d3.forceManyBody().strength(-500))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('x', d3.forceX(width / 2).strength(0.03))
      .force('y', d3.forceY(height / 2).strength(0.03));

    // 连线
    const link = svg.append('g')
      .selectAll('line')
      .data(SKILLS_DATA.edges)
      .join('line')
      .attr('stroke', '#e5e7eb')
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.6);

    // 节点组
    const node = svg.append('g')
      .selectAll('g')
      .data(SKILLS_DATA.nodes)
      .join('g')
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (event, d) => {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        })
        .on('drag', (event, d) => {
          d.fx = event.x;
          d.fy = event.y;
        })
        .on('end', (event, d) => {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
        })
      );

    // 节点圆圈
    node.append('circle')
      .attr('r', 12)
      .attr('fill', d => PHASE_COLORS[d.phase] || '#9ca3af')
      .attr('stroke', 'white')
      .attr('stroke-width', 2)
      .attr('opacity', 0.9);

    // 节点文字
    node.append('text')
      .text(d => d.name.length > 14 ? d.name.substring(0, 12) + '…' : d.name)
      .attr('text-anchor', 'middle')
      .attr('dy', 24)
      .attr('font-size', 10)
      .attr('fill', '#6b7280');

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    node.on('mouseover', (event, d) => {
      tooltip.style.opacity = '1';
      tooltip.innerHTML = `
        <h3>${d.name}</h3>
        <p>${d.description || '暂无描述'}</p>
        <span class="phase phase-${d.phase}">${d.phase}</span>
      `;
    })
    .on('mousemove', (event) => {
      tooltip.style.left = (event.pageX + 15) + 'px';
      tooltip.style.top = (event.pageY - 10) + 'px';
    })
    .on('mouseout', () => {
      tooltip.style.opacity = '0';
    });

    // 更新位置
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
  </script>
</body>
</html>
